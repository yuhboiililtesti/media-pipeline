# container-watchdog.service
[Unit]
Description=Auto-restart dead Docker containers
After=docker.service

[Service]
Type=oneshot
User=topaz
ExecStart=/bin/bash -c 'for c in radarr sonarr prowlarr bazarr overseerr autobrr flaresolverr cross-seed decluttarr tdarr gluetun-overflow qbittorrent-overflow; do docker ps --format "{{.Names}} {{.Status}}" | grep -q "^$c Up" || { echo "Restarting dead: $c"; docker restart $c; }; done'

# container-watchdog.timer
[Unit]
Description=Run container health check every 5 min

[Timer]
OnCalendar=*:0/5
Persistent=true

[Install]
WantedBy=timers.target

