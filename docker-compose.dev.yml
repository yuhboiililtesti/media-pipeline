# Development/test environment — simulates pipeline without real media
services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: pipeline-dev-radarr
    environment: [PUID=1000, PGID=1000, TZ=UTC]
    ports: [7878:7878]
    volumes: [./dev-data/radarr:/config]

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: pipeline-dev-sonarr
    environment: [PUID=1000, PGID=1000, TZ=UTC]
    ports: [8989:8989]
    volumes: [./dev-data/sonarr:/config]

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: pipeline-dev-prowlarr
    environment: [PUID=1000, PGID=1000, TZ=UTC]
    ports: [9696:9696]
    volumes: [./dev-data/prowlarr:/config]

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: pipeline-dev-qbit
    environment: [PUID=1000, PGID=1000, TZ=UTC, WEBUI_PORT=8080]
    ports: [8080:8080]
    volumes: [./dev-data/qbit:/config, ./dev-data/downloads:/downloads]

volumes:
  dev-data:
